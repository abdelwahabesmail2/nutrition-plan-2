<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متتبع النظام الغذائي 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>متتبع النظام الغذائي 🥗</h1>
            <p>عام 2025 - التزم بهدفك!</p>
        </header>

        <section class="calendar-section">
            <div class="calendar-header">
                <button id="prev-month">❮ السابق</button>
                <h2 id="month-year">يناير 2025</h2>
                <button id="next-month">التالي ❯</button>
            </div>
            <div class="weekdays">
                <div>أحد</div><div>إثنين</div><div>ثلاثاء</div><div>أربعاء</div><div>خميس</div><div>جمعة</div><div>سبت</div>
            </div>
            <div class="days-grid" id="days-grid"></div>
        </section>

        <section class="diet-section">
            <h2 id="selected-date-display">تاريخ اليوم</h2>
            <div id="success-message" class="hidden">
                🎉 بطل! لقد التزمت بنظامك الغذائي بنسبة 100% اليوم! استمر يا وحش! 🎉
            </div>
            <div id="meals-container">
                <!-- سيتم حقن الوجبات هنا بواسطة الجافاسكربت -->
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
